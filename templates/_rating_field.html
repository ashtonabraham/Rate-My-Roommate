{# Five rating sliders. Higher = better roommate behavior. #}
<label class="field rating">
  <span>Cleanliness <em class="muted">(5 = spotless)</em></span>
  <input type="range" name="cleanliness" min="1" max="5" value="4" oninput="this.nextElementSibling.textContent=this.value" />
  <output>4</output>
</label>
<label class="field rating">
  <span>Communication <em class="muted">(5 = great)</em></span>
  <input type="range" name="communication" min="1" max="5" value="4" oninput="this.nextElementSibling.textContent=this.value" />
  <output>4</output>
</label>
<label class="field rating">
  <span>Reliability <em class="muted">(5 = always pays/shows up)</em></span>
  <input type="range" name="reliability" min="1" max="5" value="4" oninput="this.nextElementSibling.textContent=this.value" />
  <output>4</output>
</label>
<label class="field rating">
  <span>Noise <em class="muted">(5 = quiet & considerate)</em></span>
  <input type="range" name="noise" min="1" max="5" value="4" oninput="this.nextElementSibling.textContent=this.value" />
  <output>4</output>
</label>
<label class="field rating">
  <span>Guests <em class="muted">(5 = respectful with guests)</em></span>
  <input type="range" name="guests" min="1" max="5" value="4" oninput="this.nextElementSibling.textContent=this.value" />
  <output>4</output>
</label>
<label class="field rating">
  <span>Overall <em class="muted">(5 = would live again)</em></span>
  <input type="range" name="overall" min="1" max="5" value="4" oninput="this.nextElementSibling.textContent=this.value" />
  <output>4</output>
</label>
